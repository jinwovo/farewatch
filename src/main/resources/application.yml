spring:
  application:
    name: farewatch
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:farewatch}
    username: ${DB_USER:farewatch}
    password: ${DB_PASSWORD:farewatch}
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6381}

server:
  port: ${SERVER_PORT:8101}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# Distributed price-watch sweep (P2): runs hourly, guarded by a Redis lock so only
# one instance polls each due watch. The scheduled trigger defaults to hourly.
farewatch:
  sweep:
    interval-ms: ${SWEEP_INTERVAL_MS:3600000}
    initial-delay-ms: ${SWEEP_INITIAL_DELAY_MS:3600000}
    lock-ttl-ms: ${SWEEP_LOCK_TTL_MS:300000}
    budget-per-tick: ${SWEEP_BUDGET:100}     # adaptive: max watches polled per tick (highest-value first)
  rate-limit:
    per-sec: ${RL_PER_SEC:1000}              # per-source token-bucket rate
    burst: ${RL_BURST:1000}
  circuit-breaker:
    failure-threshold: ${CB_THRESHOLD:5}     # consecutive source failures before the circuit opens
    cooldown-ms: ${CB_COOLDOWN_MS:30000}     # how long it stays open before a half-open probe
