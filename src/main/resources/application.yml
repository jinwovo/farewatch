spring:
  application:
    name: farewatch
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:farewatch}
    username: ${DB_USER:farewatch}
    password: ${DB_PASSWORD:farewatch}
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8101}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
