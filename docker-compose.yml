name: farewatch

services:
  postgres:
    image: postgres:16-alpine
    container_name: fw-postgres
    environment:
      POSTGRES_DB: farewatch
      POSTGRES_USER: farewatch
      POSTGRES_PASSWORD: farewatch
    ports:
      - "5435:5432"          # host 5435 (registry-allocated) -> container 5432
    volumes:
      - fw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farewatch -d farewatch"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fw-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6381:6379"          # host 6381 (registry-allocated) -> container 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fw-pgdata:
